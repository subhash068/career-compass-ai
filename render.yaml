services:
  # Backend FastAPI Service
  - type: web
    name: career-compass-backend
    env: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    targetPort: 8000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
        
    # Health check path
    healthCheckPath: /status
    
    # Auto-deploy on git push
    autoDeploy: true
    
    # Plan type (free/starter/standard)
    # plan: starter  # Uncomment for paid tier
    
  # Notes:
  # 1. Provision your database and set DATABASE_URL in Render env vars.
  # 2. Add required API keys/secrets (e.g., OPENAI_API_KEY, JWT_SECRET_KEY).
  # 3. Run migrations using backend/run_migration.py in Render shell.

