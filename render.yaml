services:
  # Backend FastAPI Service
  - type: web
    name: career-compass-backend
    env: docker
    dockerfilePath: ./backend/Dockerfile
    targetPort: 5000
    envVars:
      - key: PYTHON_VERSION
        value: 3.11
        
    # Health check path
    healthCheckPath: /health
    
    # Auto-deploy on git push
    autoDeploy: true
    
    # Plan type (free/starter/standard)
    # plan: starter  # Uncomment for paid tier
    
  # Notes:
  # 1. Create PostgreSQL database in Render dashboard first
  # 2. Set DATABASE_URL from DB internal URL
  # 3. Add API keys: OPENAI_API_KEY, PINECONE_API_KEY, SECRET_KEY
  # 4. Run migrations: Use Render Shell or cron job with backend/run_migration.py

