server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location /status {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }
}
